{% extends "base.html" %}
{% block title %}Inicio · Eiren{% endblock %}

{% block content %}
<div class="dashboard-welcome">
  <h2>Bienvenido, {{ current_user.nombre }}</h2>
  <p class="text-muted">Panel de administración</p>
</div>

<div class="dashboard-layout">
  <div class="dashboard-cal">
    <div class="cal-wrapper">
      <div class="cal-header">
        <button class="cal-nav" id="btn-prev">&#8249;</button>
        <span class="cal-titulo" id="cal-titulo"></span>
        <button class="cal-nav" id="btn-next">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <div class="dashboard-cards">
    <a href="{{ url_for('alumnos.listado') }}" class="dash-card-v">
      <span class="dash-icon">👥</span>
      <span class="dash-label">Alumnos</span>
    </a>
    <a href="{{ url_for('cursos.listado') }}" class="dash-card-v">
      <span class="dash-icon">🏫</span>
      <span class="dash-label">Cursos</span>
    </a>
    <a href="{{ url_for('profesores.listado') }}" class="dash-card-v">
      <span class="dash-icon">👨‍🏫</span>
      <span class="dash-label">Profesores</span>
    </a>
    <a href="{{ url_for('caja.index') }}" class="dash-card-v">
      <span class="dash-icon">💰</span>
      <span class="dash-label">Caja</span>
    </a>
    <a href="{{ url_for('asistencia.index') }}" class="dash-card-v">
      <span class="dash-icon">📋</span>
      <span class="dash-label">Asistencia</span>
    </a>
    <a href="{{ url_for('cumpleanios.listado') }}" class="dash-card-v">
      <span class="dash-icon">🎂</span>
      <span class="dash-label">Cumpleaños</span>
    </a>
  </div>
</div>

<div class="cal-popup-overlay" id="popup-overlay" style="display:none;">
  <div class="cal-popup" id="popup">
    <div class="cal-popup-header">
      <span id="popup-fecha"></span>
      <button class="cal-popup-close" id="popup-close">&#x2715;</button>
    </div>
    <div class="cal-popup-body" id="popup-body"></div>
  </div>
</div>

<div class="dashboard-footer">
  Sistema desarrollado por <strong>Franco Ontivero</strong>
</div>

<script>
const clasesData = {{ clases_json | safe }};
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const COLORES = ['#7A2020','#5C1A3A','#1A3A5C','#1A5C3A','#5C3A1A','#3A1A5C','#5C5C1A','#1A5C5C','#3A5C1A','#5C1A5C'];
const cursoColores = {};
let colorIdx = 0;
clasesData.forEach(c => {
  if (!cursoColores[c.curso_id]) cursoColores[c.curso_id] = COLORES[colorIdx++ % COLORES.length];
});
let anioActual, mesActual;

async function cargarCumpleanios(anio, mes) {
  try {
    const resp = await fetch(`/cumpleanios/api/mes/${anio}/${mes}`);
    const data = await resp.json();
    data.forEach(c => {
      const mm = String(mes).padStart(2, '0');
      const dd = String(c.dia).padStart(2, '0');
      const celda = document.querySelector(`[data-fecha="${anio}-${mm}-${dd}"]`);
      if (celda) {
        const torta = document.createElement('span');
        torta.className = 'cal-cumple';
        torta.title = `🎂 ${c.nombre} (${c.tipo})`;
        torta.textContent = '🎂';
        celda.appendChild(torta);
      }
    });
  } catch(e) {
    console.log('Error cargando cumpleaños:', e);
  }
}

function init() {
  const hoy = new Date();
  anioActual = hoy.getFullYear();
  mesActual  = hoy.getMonth();
  renderCalendario();
}

function renderCalendario() {
  document.getElementById('cal-titulo').textContent = MESES[mesActual] + ' ' + anioActual;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DIAS.forEach(d => {
    const c = document.createElement('div');
    c.className = 'cal-dia-header';
    c.textContent = d;
    grid.appendChild(c);
  });
  const primerDia = new Date(anioActual, mesActual, 1).getDay();
  const diasEnMes = new Date(anioActual, mesActual + 1, 0).getDate();
  const hoy = new Date();
  for (let i = 0; i < primerDia; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell cal-cell--vacio';
    grid.appendChild(c);
  }
  for (let dia = 1; dia <= diasEnMes; dia++) {
    const mm = String(mesActual + 1).padStart(2, '0');
    const dd = String(dia).padStart(2, '0');
    const fechaStr = anioActual + '-' + mm + '-' + dd;
    const del_dia = clasesData.filter(c => c.fecha === fechaStr);
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    cell.setAttribute('data-fecha', fechaStr);
    if (hoy.getFullYear() === anioActual && hoy.getMonth() === mesActual && hoy.getDate() === dia)
      cell.classList.add('cal-cell--hoy');
    if (del_dia.length) cell.classList.add('cal-cell--con-clases');
    const num = document.createElement('span');
    num.className = 'cal-num';
    num.textContent = dia;
    cell.appendChild(num);
    if (del_dia.length) {
      const dots = document.createElement('div');
      dots.className = 'cal-dots';
      del_dia.forEach(c => {
        const d = document.createElement('span');
        d.className = 'cal-dot';
        d.style.background = cursoColores[c.curso_id];
        d.title = c.curso_nombre;
        dots.appendChild(d);
      });
      cell.appendChild(dots);
      cell.addEventListener('click', () => mostrarPopup(fechaStr, del_dia));
    }
    grid.appendChild(cell);
  }
  cargarCumpleanios(anioActual, mesActual + 1);
}

function mostrarPopup(fechaStr, clases) {
  const [a, m, d] = fechaStr.split('-');
  document.getElementById('popup-fecha').textContent = d + '/' + m + '/' + a;
  const body = document.getElementById('popup-body');
  body.innerHTML = '';
  clases.forEach(c => {
    const item = document.createElement('div');
    item.className = 'popup-clase';
    item.style.borderLeftColor = cursoColores[c.curso_id];
    item.innerHTML =
      '<div class="popup-clase-nombre">' + c.curso_nombre + '</div>' +
      '<div class="popup-clase-info">' +
        '<span>&#128336; ' + c.hora_inicio + ' &ndash; ' + c.hora_fin + '</span>' +
        '<span>&#128101; ' + (c.confirmados || 0) + '/' + (c.total_alumnos || 0) + ' confirmados</span>' +
        (c.sala ? '<span>&#127963; ' + c.sala + '</span>' : '') +
        '<span class="popup-estado estado-' + c.estado + '">' + c.estado + '</span>' +
      '</div>' +
      '<div class="popup-clase-prof">&#128204; ' + c.profesor + '</div>';
    body.appendChild(item);
  });
  document.getElementById('popup-overlay').style.display = 'flex';
}

document.getElementById('popup-close').addEventListener('click', () => {
  document.getElementById('popup-overlay').style.display = 'none';
});
document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target.id === 'popup-overlay')
    document.getElementById('popup-overlay').style.display = 'none';
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (--mesActual < 0) { mesActual = 11; anioActual--; }
  renderCalendario();
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (++mesActual > 11) { mesActual = 0; anioActual++; }
  renderCalendario();
});

init();
</script>
{% endblock %}
